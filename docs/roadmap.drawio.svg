  <rect x="40" y="594" width="240" height="56" rx="8" fill="url(#plannedGrad)" stroke="#484860" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="616" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700"
