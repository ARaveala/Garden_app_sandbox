  <rect x="310" y="590" width="510" height="90" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="326" y="611" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ C++ Data Cleaner: normalise · deduplicate · validate</text>
  <text x="326" y="626" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ C++ Calculator: min/max/ideal light hours per plant</text>
  <text x="326" y="641" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ DLI adapted to location · season · day length</text>
  <text x="326" y="656" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Plant stress indicators · photoperiod sensitivity flags</text>
  <text x="326" y="671" font-family="JetBrains Mono, monospace" font-size="10" fill="#6e7681">▸ Target: predictive modelling via forecast weather data</text>
  <line x1="280" y1="622" x2="310" y2="622" stroke="#484860" stroke-width="1" stroke-opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PHASE 4 -->
  <!-- ═══════════════════════════════════════════════ -->
  <circle cx="160" cy="768" r="6" fill="#484860"/>
  <rect x="40" y="740" width="240" height="56" rx="8" fill="url(#plannedGrad)" stroke="#484860" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="762" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700"
    fill="#a0a0c0" text-anchor="middle">Phase 4 — Production</text>
  <text x="160" y="780" font-family="JetBrains Mono, monospace" font-size="10"
