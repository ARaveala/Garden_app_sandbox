  <rect x="40" y="330" width="240" height="56" rx="8" fill="url(#activeGrad)" stroke="#4a90d9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="352" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700"
