  <text x="160" y="122" font-family="JetBrains Mono, monospace" font-size="10"
    fill="#81c784" text-anchor="middle">✓ Complete</text>

  <!-- Phase 1 detail card -->
  <rect x="310" y="78" width="510" height="64" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="326" y="99" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Harvester · Database · Display containers</text>
  <text x="326" y="114" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ USDA API · MariaDB JSON schema · Pino logging</text>
  <text x="326" y="129" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Base/subclass harvester pattern · C++ display client</text>
  <!-- connector arrow -->
  <line x1="280" y1="110" x2="310" y2="110" stroke="#4caf50" stroke-width="1" stroke-opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PHASE 1.1 -->
  <!-- ═══════════════════════════════════════════════ -->
  <circle cx="160" cy="234" r="6" fill="#4a90d9" filter="url(#glow)"/>
  <rect x="40" y="206" width="240" height="56" rx="8" fill="url(#activeGrad)" stroke="#4a90d9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="228" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700"
    fill="#4a90d9" text-anchor="middle">Phase 1.1 — Dev / Prod Switch</text>
  <text x="160" y="246" font-family="JetBrains Mono, monospace" font-size="10"
    fill="#90caf9" text-anchor="middle">Environment config</text>

  <rect x="310" y="202" width="510" height="64" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="326" y="223" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ .env.dev / .env.prod · make dev / make prod targets</text>
  <text x="326" y="238" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ PLANT_LIMIT controls harvest size per environment</text>
  <text x="326" y="253" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Full dataset deferred until Phase 3 pipeline is stable</text>
  <line x1="280" y1="234" x2="310" y2="234" stroke="#4a90d9" stroke-width="1" stroke-opacity="0.5"/>

