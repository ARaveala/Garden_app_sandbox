  <rect x="40" y="462" width="240" height="56" rx="8" fill="url(#plannedGrad)" stroke="#7c6fd4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="484" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700"
