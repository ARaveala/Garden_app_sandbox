  <text x="326" y="494" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Extract DLI · PPFD · photoperiod values per plant</text>
  <text x="326" y="509" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Per-plant (not bulk) — depends on 2a being stable</text>
  <text x="326" y="524" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Store full provenance: DOI · authors · date</text>
  <line x1="280" y1="490" x2="310" y2="490" stroke="#7c6fd4" stroke-width="1" stroke-opacity="0.5"/>

