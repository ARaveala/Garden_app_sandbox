  <!-- PHASE 1 -->
  <!-- ═══════════════════════════════════════════════ -->
  <circle cx="160" cy="110" r="6" fill="#4caf50" filter="url(#glow)"/>
  <rect x="40" y="82" width="240" height="56" rx="8" fill="url(#doneGrad)" stroke="#4caf50" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="104" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700"
