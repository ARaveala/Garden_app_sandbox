  <rect x="640" y="30" width="12" height="12" rx="2" fill="#1a2744" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="658" y="41" font-family="JetBrains Mono, monospace" font-size="10" fill="#6e7681">in progress</text>
