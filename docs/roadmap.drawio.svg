  <rect x="310" y="326" width="510" height="70" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="326" y="347" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ GBIF (occurrence · GPS distribution data)</text>
  <text x="326" y="362" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Kew POWO (taxonomy · native ranges · synonyms)</text>
  <text x="326" y="377" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ NASA POWER (solar radiation · DLI · UV · weather)</text>
  <text x="326" y="392" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Per-source docs: fields · meanings · limitations</text>
  <line x1="280" y1="358" x2="310" y2="358" stroke="#4a90d9" stroke-width="1" stroke-opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PHASE 2b -->
  <!-- ═══════════════════════════════════════════════ -->
