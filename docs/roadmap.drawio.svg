  <rect x="310" y="736" width="510" height="64" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="326" y="757" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Task queue · automated scheduling · API layer</text>
  <text x="326" y="772" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Monitoring · alerting · archiving strategy</text>
  <text x="326" y="787" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">▸ Full dataset harvesting enabled via PLANT_LIMIT</text>
  <line x1="280" y1="768" x2="310" y2="768" stroke="#484860" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Footer -->
  <line x1="40" y1="870" x2="820" y2="870" stroke="#21262d" stroke-width="1"/>
  <text x="430" y="892" font-family="JetBrains Mono, monospace" font-size="9" fill="#484860"
